# Small-scale advanced correction test configuration.
# Keeps the fast test profile, but enables multi-candidate NLI reranking.

mode: test
use_gpu: true

defaults:
  seed: 42
  device: auto
  dataset:
    name: ccdv/govreport-summarization
    split: validation
    cache_dir: ./data_cache

  summarizer:
    model: Qwen/Qwen2.5-1.5B-Instruct
    chunk_size: 2000
    chunk_overlap: 200
    max_summary_length: 300
    max_chunk_summary_length: 150
    num_beams: 4

  consistency:
    nli_model: facebook/bart-large-mnli
    entailment_threshold: 0.5
    evidence_top_k: 3
    sentence_window: 3
    evidence_mode: tfidf

  semantic_retrieval:
    model: all-MiniLM-L6-v2
    batch_size: 32
    enabled: false

  corrector:
    model: Qwen/Qwen2.5-1.5B-Instruct
    max_new_tokens: 40
    temperature: 0.0
    num_beams: 3
    num_candidates: 3
    max_length_ratio: 1.5

  evaluation:
    rouge_types: [rouge1, rouge2, rougeL]
    use_stemmer: true

  analysis:
    length_bins:
      - [0, 100]
      - [100, 200]
      - [200, 300]
      - [300, 400]
      - [400, 500]
      - [500, 99999]
    num_case_studies: 10

  output:
    root_dir: ./results
    save_intermediate: true

  logging:
    level: INFO

test:
  num_samples: 2
  summarizer:
    chunk_size: 800
    max_summary_length: 150
    num_beams: 1
  corrector:
    max_new_tokens: 40
    num_beams: 3
    num_candidates: 3

full:
  num_samples: 500
  consistency:
    evidence_mode: tfidf
  semantic_retrieval:
    enabled: false

